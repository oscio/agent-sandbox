; supervisord runs as PID 1 (via tini) and manages code-server + ttyd.
; All programs run as `coder`. stdout/stderr go to the pod log so
; `kubectl logs` shows everything.

[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[program:sshd]
; Pod-internal sshd. Only reachable from sibling containers in the
; same pod (network namespace shared); not exposed off-pod. Used by
; the agent sidecar's bash-ssh-shim to forward command execution
; into the workspace's tool environment. Key auth only — config in
; /etc/ssh/sshd_config (set at image build).
command=/usr/sbin/sshd -D -e
user=root
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ttyd]
; Standalone xterm.js → bash bridge on :7681. Distinct from code-server's
; integrated terminal — gives users a lightweight "open a shell in the pod"
; URL without loading the full VSCode UI. Login shell so coder's profile
; (PATH, aliases, etc.) loads.
;
; --client-option flags are forwarded to xterm.js. Keys are documented
; at https://xtermjs.org/docs/api/terminal/interfaces/iterminaloptions/
; Theme JSON is single-line (supervisord eats the trailing backslash on
; the next line, so don't word-wrap). VS Code's "Dark+" palette mapped
; to the closest xterm.js fields:
command=/usr/local/bin/ttyd --port 7681 --interface 0.0.0.0 --writable
    --client-option fontFamily="JetBrainsMono Nerd Font, Menlo, Consolas, monospace"
    --client-option fontSize=14
    --client-option lineHeight=1.2
    --client-option cursorBlink=true
    --client-option theme={"background":"#1e1e1e","foreground":"#d4d4d4","cursor":"#d4d4d4","selectionBackground":"#264f78","black":"#000000","red":"#cd3131","green":"#0dbc79","yellow":"#e5e510","blue":"#2472c8","magenta":"#bc3fbc","cyan":"#11a8cd","white":"#e5e5e5","brightBlack":"#666666","brightRed":"#f14c4c","brightGreen":"#23d18b","brightYellow":"#f5f543","brightBlue":"#3b8eea","brightMagenta":"#d670d6","brightCyan":"#29b8db","brightWhite":"#e5e5e5"}
    bash -l
user=coder
directory=/home/coder
environment=HOME="/home/coder",USER="coder",SHELL="/bin/bash",DOCKER_HOST="tcp://localhost:2375"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:code-server]
command=/usr/local/bin/code-server
    --bind-addr=0.0.0.0:8080
    --auth=none
    --disable-telemetry
    --disable-update-check
    /home/coder/workspace
user=coder
directory=/home/coder
environment=HOME="/home/coder",USER="coder",SHELL="/bin/bash",DOCKER_HOST="tcp://localhost:2375"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
