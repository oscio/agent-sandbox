name: build-and-push

# Forgejo Actions workflow — builds BOTH workspace variants on push:
#   - agent-workspace          : basic (code-server + hermes-agent + webui + ttyd)
#   - agent-workspace-desktop  : basic + XFCE + KasmVNC + xdotool/scrot
#
# Desktop image FROM's the basic image, so the basic build must finish
# first (Forgejo Actions `needs:` enforces ordering). Both push to the
# in-cluster Harbor; tags are commit SHA + `latest`.
#
# Runs on the in-cluster Forgejo Runner. Uses catthehacker/ubuntu (has
# docker CLI + node), driver=docker so buildx talks to the DinD sidecar
# directly, and DinD's --insecure-registry covers the self-signed
# Harbor cert. Auth uses repo/org secrets HARBOR_USER / HARBOR_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  HARBOR: registry.dev.openschema.io
  PROJECT: agent-platform

jobs:
  basic:
    runs-on: ubuntu-latest
    # In-cluster Forgejo runner only. GitHub Actions skips: no in-cluster
    # Harbor access, no HARBOR_USER/TOKEN secrets. github.server_url is
    # the Forgejo URL on Forgejo, "https://github.com" on GitHub.
    if: github.server_url != 'https://github.com'
    outputs:
      image_ref: ${{ env.HARBOR }}/${{ env.PROJECT }}/agent-workspace:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push (basic)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.HARBOR }}/${{ env.PROJECT }}/agent-workspace:${{ github.sha }}
            ${{ env.HARBOR }}/${{ env.PROJECT }}/agent-workspace:latest

  desktop:
    runs-on: ubuntu-latest
    needs: basic
    if: github.server_url != 'https://github.com'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push (desktop)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.desktop
          push: true
          # Desktop image bases off the basic image we just pushed —
          # `--build-arg` passes the SHA-tagged ref so we never compose
          # against a stale `latest`.
          build-args: |
            WORKSPACE_BASE=${{ needs.basic.outputs.image_ref }}
          tags: |
            ${{ env.HARBOR }}/${{ env.PROJECT }}/agent-workspace-desktop:${{ github.sha }}
            ${{ env.HARBOR }}/${{ env.PROJECT }}/agent-workspace-desktop:latest
